<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, system-ui, sans-serif">
  <!-- background -->
  <rect width="1200" height="630" fill="#0b1220"/>

  <!-- subtle grid -->
  <g stroke="#111a2c" stroke-width="1">
    <path d="M0 105 H1200 M0 210 H1200 M0 315 H1200 M0 420 H1200 M0 525 H1200"/>
    <path d="M150 0 V630 M300 0 V630 M450 0 V630 M600 0 V630 M750 0 V630 M900 0 V630 M1050 0 V630"/>
  </g>

  <!-- title -->
  <text x="600" y="80" text-anchor="middle" fill="#f8fafc" font-size="38" font-weight="700" letter-spacing="-0.5">
    Planeje antes de codar
  </text>
  <text x="600" y="112" text-anchor="middle" fill="#94a3b8" font-size="18">
    o valor não é o plano — é o desacordo que ele revela
  </text>

  <!-- ===== LEFT SIDE: just write it ===== -->
  <g>
    <text x="280" y="160" text-anchor="middle" fill="#fb7185" font-size="14" font-weight="700" letter-spacing="4" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      "SÓ ESCREVE"
    </text>

    <!-- prompt box -->
    <rect x="60" y="180" width="440" height="60" rx="10" fill="#131c2e" stroke="#1f2a44" stroke-width="2"/>
    <text x="80" y="207" fill="#64748b" font-size="11" letter-spacing="2" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">PROMPT</text>
    <text x="80" y="228" fill="#f8fafc" font-size="17" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">"Refatore o fluxo de auth."</text>

    <!-- arrow down -->
    <g stroke="#fb7185" stroke-width="2" fill="none">
      <path d="M280 250 L280 275" />
    </g>
    <polygon points="280,278 272,265 288,265" fill="#fb7185"/>

    <!-- diff box -->
    <rect x="60" y="285" width="440" height="200" rx="10" fill="#131c2e" stroke="#1f2a44" stroke-width="2"/>
    <text x="80" y="310" fill="#64748b" font-size="11" letter-spacing="2" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">DIFF — 300 LINHAS</text>

    <g font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace" font-size="13" fill="#f8fafc">
      <text x="80" y="335"><tspan fill="#fb7185" font-weight="700">+</tspan> extraiu classe AuthBase</text>
      <text x="80" y="356"><tspan fill="#fb7185" font-weight="700">+</tspan> adicionou 3 classes de estratégia</text>
      <text x="80" y="377"><tspan fill="#fb7185" font-weight="700">+</tspan> reescreveu 6 chamadores</text>
      <text x="80" y="398"><tspan fill="#fb7185" font-weight="700">+</tspan> adicionou 18 testes novos</text>
      <text x="80" y="419"><tspan fill="#fb7185" font-weight="700">+</tspan> renomeou arquivos</text>
    </g>

    <!-- stamp -->
    <g transform="translate(280 462) rotate(-6)">
      <rect x="-160" y="-18" width="320" height="36" rx="4" fill="none" stroke="#fb7185" stroke-width="2.5"/>
      <text x="0" y="6" text-anchor="middle" fill="#fb7185" font-size="13" font-weight="800" letter-spacing="2" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
        ABSTRAÇÃO ERRADA — REVERTER
      </text>
    </g>

    <text x="280" y="535" text-anchor="middle" fill="#94a3b8" font-size="14">
      pego no review · 8 horas perdidas
    </text>
  </g>

  <!-- divider -->
  <line x1="600" y1="150" x2="600" y2="560" stroke="#1f2a44" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- ===== RIGHT SIDE: plan first ===== -->
  <g>
    <text x="920" y="160" text-anchor="middle" fill="#34d399" font-size="14" font-weight="700" letter-spacing="4" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      "PLANEJE PRIMEIRO"
    </text>

    <!-- prompt box -->
    <rect x="700" y="180" width="440" height="60" rx="10" fill="#0f1d2a" stroke="#34d399" stroke-width="2"/>
    <text x="720" y="207" fill="#64748b" font-size="11" letter-spacing="2" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">PROMPT</text>
    <text x="720" y="228" fill="#f8fafc" font-size="16" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">"Refatore auth. <tspan fill="#34d399" font-weight="700">Planeje primeiro.</tspan>"</text>

    <!-- arrow down -->
    <g stroke="#34d399" stroke-width="2" fill="none">
      <path d="M920 250 L920 275" />
    </g>
    <polygon points="920,278 912,265 928,265" fill="#34d399"/>

    <!-- plan box -->
    <rect x="700" y="285" width="440" height="200" rx="10" fill="#0f1d2a" stroke="#34d399" stroke-width="2"/>
    <text x="720" y="310" fill="#64748b" font-size="11" letter-spacing="2" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">PLANO — 5 PASSOS</text>

    <g font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace" font-size="13" fill="#f8fafc">
      <text x="720" y="335">1. ler uso atual de authFlow()</text>
      <text x="720" y="356">2. extrair validação compartilhada</text>
      <g>
        <text x="720" y="377" fill="#64748b" text-decoration="line-through">3. adicionar strategy pattern p/ 3 casos</text>
        <line x1="720" y1="373" x2="1080" y2="373" stroke="#fb7185" stroke-width="2"/>
      </g>
      <text x="720" y="398">4. atualizar cada chamador</text>
      <text x="720" y="419">5. adicionar testes por ramo</text>
    </g>

    <!-- callout for step 3 -->
    <g transform="translate(920 462)">
      <text x="0" y="0" text-anchor="middle" fill="#34d399" font-size="14" font-weight="700" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
        ↑ pego em 90 segundos
      </text>
    </g>

    <text x="920" y="535" text-anchor="middle" fill="#94a3b8" font-size="14">
      nenhum código escrito · sem reverter
    </text>
  </g>

  <!-- footer tagline -->
  <text x="600" y="585" text-anchor="middle" fill="#cbd5e1" font-size="18" font-style="italic">
    se você não consegue prever o diff, planeje primeiro.
  </text>

  <!-- watermark -->
  <text x="1140" y="615" text-anchor="end" fill="#475569" font-size="14" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
    furevikstrand.cloud
  </text>
</svg>
