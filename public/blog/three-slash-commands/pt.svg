<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, system-ui, sans-serif">
  <rect width="1200" height="630" fill="#0b1220"/>

  <g stroke="#111a2c" stroke-width="1">
    <path d="M0 105 H1200 M0 210 H1200 M0 315 H1200 M0 420 H1200 M0 525 H1200"/>
    <path d="M150 0 V630 M300 0 V630 M450 0 V630 M600 0 V630 M750 0 V630 M900 0 V630 M1050 0 V630"/>
  </g>

  <text x="600" y="80" text-anchor="middle" fill="#f8fafc" font-size="38" font-weight="700" letter-spacing="-0.5">
    Três slash commands que pagam o aluguel
  </text>
  <text x="600" y="112" text-anchor="middle" fill="#94a3b8" font-size="18">
    a ferramenta é grátis — o hábito é o custo
  </text>

  <g>
    <rect x="60" y="150" width="350" height="395" rx="12" fill="#0f1d2a" stroke="#34d399" stroke-width="2"/>
    <text x="80" y="190" fill="#34d399" font-size="22" font-weight="700" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      /review
    </text>
    <text x="80" y="218" fill="#94a3b8" font-size="13" letter-spacing="1" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      PASSE DE REVIEW
    </text>

    <text x="80" y="265" fill="#f8fafc" font-size="14" font-weight="600">O que pega:</text>
    <g font-size="13" fill="#cbd5e1">
      <text x="80" y="288">· testes pela metade</text>
      <text x="80" y="310">· TODOs esquecidos</text>
      <text x="80" y="332">· callers órfãos</text>
      <text x="80" y="354">· imports não usados</text>
    </g>

    <line x1="80" y1="385" x2="390" y2="385" stroke="#1f2a44" stroke-width="1"/>

    <text x="80" y="410" fill="#fb7185" font-size="12" font-weight="700" letter-spacing="2" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      ERRO COMUM
    </text>
    <g font-size="13" fill="#f8fafc">
      <text x="80" y="435">rodar</text>
      <text x="80" y="455" font-weight="700" fill="#fb7185">depois do push.</text>
      <text x="80" y="487" fill="#94a3b8">Aí já é teatro —</text>
      <text x="80" y="507" fill="#94a3b8">capturas pedem PR de</text>
      <text x="80" y="527" fill="#94a3b8">follow-up.</text>
    </g>
  </g>

  <g>
    <rect x="425" y="150" width="350" height="395" rx="12" fill="#0f1d2a" stroke="#34d399" stroke-width="2"/>
    <text x="445" y="190" fill="#34d399" font-size="22" font-weight="700" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      /security-review
    </text>
    <text x="445" y="218" fill="#94a3b8" font-size="13" letter-spacing="1" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      AUDITORIA DE SEGURANÇA
    </text>

    <text x="445" y="265" fill="#f8fafc" font-size="14" font-weight="600">Quando rodar:</text>
    <g font-size="13" fill="#cbd5e1">
      <text x="445" y="288">· mudanças de auth</text>
      <text x="445" y="310">· qualquer leitura de input</text>
      <text x="445" y="332">· cruza fronteira de confiança</text>
      <text x="445" y="354">· HTTP / IO / subprocess</text>
    </g>

    <line x1="445" y1="385" x2="755" y2="385" stroke="#1f2a44" stroke-width="1"/>

    <text x="445" y="410" fill="#fb7185" font-size="12" font-weight="700" letter-spacing="2" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      ERRO COMUM
    </text>
    <g font-size="13" fill="#f8fafc">
      <text x="445" y="435">apontar pra</text>
      <text x="445" y="455" font-weight="700" fill="#fb7185">branch inteira.</text>
      <text x="445" y="487" fill="#94a3b8">12 achados plausíveis,</text>
      <text x="445" y="507" fill="#94a3b8">metade irrelevante.</text>
      <text x="445" y="527" fill="#94a3b8">O sinal afunda.</text>
    </g>
  </g>

  <g>
    <rect x="790" y="150" width="350" height="395" rx="12" fill="#0f1d2a" stroke="#34d399" stroke-width="2"/>
    <text x="810" y="190" fill="#34d399" font-size="22" font-weight="700" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      /init
    </text>
    <text x="810" y="218" fill="#94a3b8" font-size="13" letter-spacing="1" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      BOOTSTRAP CLAUDE.md
    </text>

    <text x="810" y="265" fill="#f8fafc" font-size="14" font-weight="600">O que você ganha:</text>
    <g font-size="13" fill="#cbd5e1">
      <text x="810" y="288">· resumo de estrutura</text>
      <text x="810" y="310">· palpite de convenções</text>
      <text x="810" y="332">· andaime inicial</text>
      <text x="810" y="354">· seções para preencher</text>
    </g>

    <line x1="810" y1="385" x2="1120" y2="385" stroke="#1f2a44" stroke-width="1"/>

    <text x="810" y="410" fill="#fb7185" font-size="12" font-weight="700" letter-spacing="2" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      ERRO COMUM
    </text>
    <g font-size="13" fill="#f8fafc">
      <text x="810" y="435">manter a saída</text>
      <text x="810" y="455" font-weight="700" fill="#fb7185">como está.</text>
      <text x="810" y="487" fill="#94a3b8">Genérico. Papel de parede.</text>
      <text x="810" y="507" fill="#94a3b8">O valor está nas edições</text>
      <text x="810" y="527" fill="#94a3b8">que você faz em cima.</text>
    </g>
  </g>

  <text x="600" y="585" text-anchor="middle" fill="#cbd5e1" font-size="18" font-style="italic">
    grátis pra rodar · valor zero se rodar errado.
  </text>

  <text x="1140" y="615" text-anchor="end" fill="#475569" font-size="14" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
    furevikstrand.cloud
  </text>
</svg>
