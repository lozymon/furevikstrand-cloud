<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, system-ui, sans-serif">
  <!-- background -->
  <rect width="1200" height="630" fill="#0b1220"/>

  <!-- subtle grid for technical feel -->
  <g stroke="#111a2c" stroke-width="1">
    <path d="M0 105 H1200 M0 210 H1200 M0 315 H1200 M0 420 H1200 M0 525 H1200"/>
    <path d="M150 0 V630 M300 0 V630 M450 0 V630 M600 0 V630 M750 0 V630 M900 0 V630 M1050 0 V630"/>
  </g>

  <!-- title -->
  <text x="600" y="88" text-anchor="middle" fill="#f8fafc" font-size="40" font-weight="700" letter-spacing="-0.5">
    Two services. One number. Two answers.
  </text>

  <!-- LEFT CARD: display path -->
  <g>
    <rect x="80" y="170" width="380" height="300" rx="14" fill="#131c2e" stroke="#1f2a44" stroke-width="2"/>
    <rect x="80" y="170" width="6" height="300" rx="3" fill="#38bdf8"/>
    <text x="110" y="208" fill="#38bdf8" font-size="15" font-weight="700" letter-spacing="2" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      DISPLAY  PATH
    </text>
    <text x="110" y="234" fill="#94a3b8" font-size="17" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      local DB query
    </text>
    <text x="270" y="358" text-anchor="middle" fill="#f8fafc" font-size="58" font-weight="700" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      sold = 7
    </text>
    <text x="110" y="425" fill="#64748b" font-size="15" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      excludes reservation
    </text>
    <text x="110" y="447" fill="#64748b" font-size="15" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      coupon subscriptions
    </text>
  </g>

  <!-- RIGHT CARD: validation path -->
  <g>
    <rect x="740" y="170" width="380" height="300" rx="14" fill="#131c2e" stroke="#1f2a44" stroke-width="2"/>
    <rect x="1114" y="170" width="6" height="300" rx="3" fill="#fb7185"/>
    <text x="770" y="208" fill="#fb7185" font-size="15" font-weight="700" letter-spacing="2" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      VALIDATION  PATH
    </text>
    <text x="770" y="234" fill="#94a3b8" font-size="17" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      HTTP → other service
    </text>
    <text x="930" y="358" text-anchor="middle" fill="#f8fafc" font-size="58" font-weight="700" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      sold = 10
    </text>
    <text x="770" y="425" fill="#64748b" font-size="15" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      includes reservation
    </text>
    <text x="770" y="447" fill="#64748b" font-size="15" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      coupon subscriptions
    </text>
  </g>

  <!-- CENTER GAP -->
  <g>
    <line x1="465" y1="320" x2="540" y2="320" stroke="#334155" stroke-width="2" stroke-dasharray="6 6"/>
    <line x1="660" y1="320" x2="735" y2="320" stroke="#334155" stroke-width="2" stroke-dasharray="6 6"/>
    <circle cx="600" cy="320" r="62" fill="#0b1220" stroke="#fbbf24" stroke-width="2"/>
    <text x="600" y="316" text-anchor="middle" fill="#fbbf24" font-size="30" font-weight="700" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      Δ = 3
    </text>
    <text x="600" y="346" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600" letter-spacing="3" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
      THE  GAP
    </text>
  </g>

  <!-- footer tagline -->
  <text x="600" y="540" text-anchor="middle" fill="#cbd5e1" font-size="22" font-style="italic">
    the bug isn't in either service. it's in the gap.
  </text>

  <!-- watermark -->
  <text x="1140" y="600" text-anchor="end" fill="#475569" font-size="14" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Consolas, monospace">
    furevikstrand.cloud
  </text>
</svg>
